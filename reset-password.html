<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset password / Talk To Sev</title>
  <meta name="description" content="Set a new password for your Compound account.">
  <meta name="robots" content="noindex, nofollow">

  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=DM+Sans:ital,opsz,wght@0,9..40,300..800;1,9..40,400&family=Caveat:wght@400;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/styles.css">

  <style>
    /* shares the same brutalist auth look as /login */
    .auth-wrap {
      min-height: calc(100vh - 60px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 64px 32px;
    }
    .auth-card {
      width: 100%;
      max-width: 460px;
      background: var(--paper);
      border: 2px solid var(--ink);
      box-shadow: 12px 12px 0 var(--ink);
      padding: 40px;
    }
    .auth-eyebrow {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--red);
      font-weight: 600;
      margin-bottom: 14px;
    }
    .auth-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: clamp(34px, 5vw, 48px);
      line-height: 0.95;
      letter-spacing: -0.035em;
      margin-bottom: 14px;
    }
    .auth-title .serif {
      color: var(--red);
      font-style: italic;
      font-weight: 300;
      font-variation-settings: "wdth" 78;
    }
    .auth-lede {
      color: var(--ink-soft);
      font-size: 16px;
      line-height: 1.5;
      margin-bottom: 28px;
    }
    .auth-form { display: flex; flex-direction: column; gap: 18px; }
    .field { display: flex; flex-direction: column; gap: 8px; }
    .field-label {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: 600;
    }
    .field-input {
      font-family: var(--font-sans);
      font-size: 16px;
      background: var(--bg);
      border: 2px solid var(--ink);
      padding: 14px 16px;
      outline: none;
      transition: background 0.18s ease, box-shadow 0.18s ease;
      border-radius: 0;
      -webkit-appearance: none;
    }
    .field-input:focus {
      background: var(--paper);
      box-shadow: 4px 4px 0 var(--red);
      transform: translate(-1px, -1px);
    }
    .field-input::placeholder { color: var(--ink-soft); opacity: 0.55; }
    .field-input.is-error {
      box-shadow: 4px 4px 0 var(--red);
      background: rgba(230, 57, 53, 0.06);
    }
    .field-hint {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-soft);
      font-weight: 500;
    }
    .submit-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: var(--ink);
      color: var(--paper);
      padding: 18px 32px;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 18px;
      border: 2px solid var(--ink);
      box-shadow: 7px 7px 0 var(--red);
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
      margin-top: 8px;
      width: 100%;
      border-radius: 0;
    }
    .submit-btn:hover:not(:disabled) {
      transform: translate(-2px, -2px);
      box-shadow: 11px 11px 0 var(--red);
    }
    .submit-btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .submit-btn.is-loading { color: transparent; position: relative; }
    .submit-btn.is-loading::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 22px;
      height: 22px;
      margin: -11px 0 0 -11px;
      border: 3px solid var(--paper);
      border-top-color: transparent;
      border-radius: 50%;
      animation: rpwSpin 0.7s linear infinite;
    }
    @keyframes rpwSpin { to { transform: rotate(360deg); } }
    .msg {
      padding: 14px 16px;
      border: 2px solid var(--ink);
      font-size: 14px;
      line-height: 1.45;
      display: none;
      margin-bottom: 16px;
    }
    .msg.show { display: block; }
    .msg-error { background: rgba(230, 57, 53, 0.12); border-color: var(--red); color: var(--red-deep); }
    .msg-success { background: rgba(31, 78, 95, 0.12); border-color: var(--blue); color: var(--blue); }
    .auth-foot {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--ink);
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-soft);
      font-weight: 500;
      text-align: center;
    }
    .auth-foot a { color: var(--ink); border-bottom: 1px solid var(--ink); padding-bottom: 1px; }
    .auth-foot a:hover { color: var(--red); border-color: var(--red); }

    .hidden { display: none !important; }

    @media (max-width: 520px) {
      .auth-card { padding: 28px 22px; box-shadow: 8px 8px 0 var(--ink); }
    }
  </style>
</head>

<body>
  <div class="grain" aria-hidden="true"></div>

  <div class="topbar">
    <div class="topbar-inner">
      <a class="topbar-brand" href="/"><span class="live-dot"></span>Talk To Sev <span class="topbar-sub">/ Reset password</span></a>
      <div class="topbar-links">
        <a href="/login">Sign in</a>
      </div>
    </div>
  </div>

  <main class="auth-wrap">
    <div class="auth-card">
      <p class="auth-eyebrow" id="eyebrow">The Compound · Members</p>
      <h1 class="auth-title" id="title">Set a <span class="serif">new password.</span></h1>
      <p class="auth-lede" id="lede">Enter a new password and we'll sign you straight in.</p>

      <div id="errorMsg" class="msg msg-error" role="alert"></div>
      <div id="successMsg" class="msg msg-success" role="status"></div>

      <form class="auth-form hidden" id="resetForm" autocomplete="off" novalidate>
        <div class="field">
          <label class="field-label" for="password">New password</label>
          <input
            class="field-input"
            id="password"
            name="password"
            type="password"
            autocomplete="new-password"
            placeholder="At least 8 characters"
            minlength="8"
            required
          >
          <span class="field-hint">Minimum 8 characters</span>
        </div>

        <div class="field">
          <label class="field-label" for="password2">Confirm new password</label>
          <input
            class="field-input"
            id="password2"
            name="password2"
            type="password"
            autocomplete="new-password"
            placeholder="Re-enter your new password"
            minlength="8"
            required
          >
        </div>

        <button class="submit-btn" type="submit" id="submitBtn">
          <span class="submit-label" id="submitLabel">Save new password</span>
          <span class="arr">→</span>
        </button>
      </form>

      <div class="auth-foot">
        <a href="/login">Back to sign in</a>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
  (function () {
    // ============================================================
    // Compound (online) Supabase project.
    // detectSessionInUrl: true lets Supabase pick up the recovery
    // tokens from the email link's URL fragment automatically.
    // ============================================================
    var SUPABASE_URL  = 'https://jspxpcczeeatrmcmmbly.supabase.co';
    var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpzcHhwY2N6ZWVhdHJtY21tYmx5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MzY5MzUsImV4cCI6MjA5MjQxMjkzNX0.ijiRDXaBQ5K6DjCaUqVhVGA3C2vgqkellLW-3M5hvfg';
    var MEMBERS_PATH  = '/members';

    // ----- detect flow (invite vs recovery) from URL hash BEFORE Supabase consumes it -----
    var hashRaw = window.location.hash || '';
    var hashParams = new URLSearchParams(hashRaw.replace(/^#/, ''));
    var FLOW = hashParams.get('type') === 'invite' ? 'invite' : 'recovery';

    var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
      auth: {
        storageKey: 'tts-compound-auth',
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true,
        flowType: 'implicit'
      }
    });

    var form       = document.getElementById('resetForm');
    var pw1        = document.getElementById('password');
    var pw2        = document.getElementById('password2');
    var submitBtn  = document.getElementById('submitBtn');
    var submitLbl  = document.getElementById('submitLabel');
    var errorMsg   = document.getElementById('errorMsg');
    var successMsg = document.getElementById('successMsg');
    var eyebrow    = document.getElementById('eyebrow');
    var titleEl    = document.getElementById('title');
    var lede       = document.getElementById('lede');

    // swap copy for invite flow
    if (FLOW === 'invite') {
      document.title = 'Welcome / Talk To Sev';
      eyebrow.textContent = 'The Compound · Welcome';
      titleEl.innerHTML = 'Set your <span class="serif">password.</span>';
      lede.textContent = 'You’re in. Pick a password and we’ll take you to your members hub.';
      submitLbl.textContent = 'Create my password';
    }

    function showError(text) {
      errorMsg.textContent = text;
      errorMsg.classList.add('show');
      successMsg.classList.remove('show');
    }
    function showSuccess(text) {
      successMsg.textContent = text;
      successMsg.classList.add('show');
      errorMsg.classList.remove('show');
    }
    function clearMessages() {
      errorMsg.classList.remove('show');
      successMsg.classList.remove('show');
      pw1.classList.remove('is-error');
      pw2.classList.remove('is-error');
    }
    function setLoading(loading) {
      submitBtn.disabled = loading;
      submitBtn.classList.toggle('is-loading', loading);
    }

    // ----- wait for Supabase to consume the recovery hash, then show form -----
    sb.auth.onAuthStateChange(function (event, session) {
      if (event === 'PASSWORD_RECOVERY' || (session && event === 'SIGNED_IN')) {
        form.classList.remove('hidden');
      }
    });

    // also check on load — if user already has a session (e.g. clicked link in same browser),
    // surface the form right away
    (async function init() {
      try {
        // Clear the hash for cleanliness — Supabase has already parsed it
        if (window.location.hash && window.location.hash.indexOf('access_token') !== -1) {
          history.replaceState(null, '', window.location.pathname + window.location.search);
        }
        var { data } = await sb.auth.getSession();
        if (data && data.session) {
          form.classList.remove('hidden');
        } else {
          // give onAuthStateChange a moment, then if still no session, show a helpful error
          setTimeout(async function () {
            var s = (await sb.auth.getSession()).data.session;
            if (!s && form.classList.contains('hidden')) {
              lede.textContent = '';
              var msg = FLOW === 'invite'
                ? 'This invite link is invalid or has expired. Ask Sev to send a fresh one.'
                : 'This reset link is invalid or has expired. Request a fresh one from the sign-in page.';
              showError(msg);
            }
          }, 1500);
        }
      } catch (e) {
        showError('Could not initialise. Try refreshing the page.');
      }
    })();

    // ----- submit new password -----
    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      clearMessages();

      var p1 = pw1.value || '';
      var p2 = pw2.value || '';

      if (p1.length < 8) {
        showError('Password must be at least 8 characters.');
        pw1.classList.add('is-error');
        pw1.focus();
        return;
      }
      if (p1 !== p2) {
        showError('Passwords don’t match.');
        pw2.classList.add('is-error');
        pw2.focus();
        return;
      }

      setLoading(true);
      try {
        var resp = await sb.auth.updateUser({ password: p1 });
        if (resp.error) throw resp.error;

        showSuccess('Password updated. Redirecting…');
        setTimeout(function () { window.location.replace(MEMBERS_PATH); }, 800);
      } catch (err) {
        console.error('Password update failed:', err);
        showError((err && err.message) || 'Could not update password. Please try again.');
        setLoading(false);
      }
    });
  })();
  </script>
</body>
</html>
